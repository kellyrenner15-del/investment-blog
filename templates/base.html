<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <meta name="description" content="{% block description %}堀江貴文の投資ブログ。初心者から経験者まで学べる株式投資講座。{% endblock %}">
    <meta name="keywords" content="投資, 株式投資, 初心者向け, 投資ガイド">
    
    <meta property="og:title" content="{% block og_title %}堀江貴文の投資ブログ{% endblock %}">
    <meta property="og:description" content="{% block og_description %}初心者から経験者まで学べる株式投資講座{% endblock %}">
    <meta property="og:image" content="/static/images/logo.png">
    <meta property="og:type" content="website">

    <title>{% block title %}堀江貴文の投資ブログ{% endblock %}</title>
    <link rel="canonical" href="{{ request.url }}">
    <link rel="shortcut icon" href="/static/images/logo.png">
    <link rel="apple-touch-icon" href="/static/images/logo.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- ナビゲーション -->
    <header class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a href="/" class="logo">
                    <img src="/static/images/logo.png" alt="ロゴ" class="logo-img">
                    <span class="logo-text">堀江式 投資講座</span>
                </a>
            </div>

            <nav class="nav-links">
                <a href="/">ホーム</a>
                <a href="/learning">学習センター</a>
                <a href="/blog">ブログ</a>
                <a href="/about">について</a>
                <a href="/contact">お問い合わせ</a>
            </nav>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- フッター -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <!-- 第 1 列：关于 -->
                <div class="footer-section">
                    <h3>堀江式 投資講座</h3>
                    <p>20年以上の投資分析経験に基づいた信頼できる投資教育を提供します。</p>
                </div>

                <!-- 第 2 列：导航 -->
                <div class="footer-section">
                    <h3>ナビゲーション</h3>
                    <ul>
                        <li><a href="/">ホーム</a></li>
                        <li><a href="/blog">ブログ</a></li>
                        <li><a href="/learning">学習センター</a></li>
                    </ul>
                </div>

                <!-- 第 3 列：法律情報 -->
                <div class="footer-section">
                    <h3>法律情報</h3>
                    <ul>
                        <li><a href="/privacy">プライバシーポリシー</a></li>
                        <li><a href="/terms">利用規約</a></li>
                        <li><a href="/disclaimer">免責事項</a></li>
                    </ul>
                </div>
            </div>

            <!-- 底部 -->
            <div class="footer-bottom">
                <p>&copy; 2026 堀江式 投資講座 | <a href="/privacy">プライバシーポリシー</a></p>
            </div>
        </div>
    </footer>

    <!-- 固定LINE按钮 -->
    <a href="https://line.me/R/ti/p/%40YOUR_LINE_ID_HERE" class="fixed-line-btn" target="_blank" rel="noopener noreferrer">
        無料で相談する
    </a>

    <script src="/static/js/script.js" defer></script>
</body>
</html>
